# ============================================================
# zzikko — 전체 스택 (backend + frontend)
#
# 실행:
#   docker compose up -d --build         # 첫 빌드 후 백그라운드 기동
#   docker compose logs -f backend       # 로그 확인
#   docker compose down                  # 정지 + 컨테이너 제거
#
# 외부 의존:
#   - DB(MySQL): zk-back/.env 의 DB_HOST/DBPORT/DBPWD/SHEMA 가 가리키는 원격 서버
#   - GCS 키 파일: zk-back/community-gcs-key.json (볼륨 마운트, 이미지에 안 박힘)
#
# 컨테이너 밖:
#   - 파이썬 워커(dgn_scrap): Windows 전용(Playwright + chrome) — 호스트에서 그대로 실행
#     호스트 → 컨테이너 포트 3041 로 백엔드 호출 (기존과 동일)
#
# 운영 배포 시:
#   - frontend 의 build arg NEXT_PUBLIC_BACK_API 를 운영 도메인으로 (예: https://api.zzikko.com)
#   - 도메인/HTTPS 가 필요하면 앞단에 nginx/traefik 서비스를 추가
# ============================================================

services:
  backend:
    build:
      context: ./zk-back
    container_name: zzikko-back
    ports:
      - "127.0.0.1:3041:4000"
    env_file:
      # DB 접속/카카오 키/GEMINI 키 등 모든 시크릿
      - ./zk-back/.env
    environment:
      # env_file 의 값들을 override (컨테이너 내부 포트 고정)
      NODE_ENV: production
      PORT: "4000"
      HOST: "0.0.0.0"
      # 서버가 UTC 로 돌고 있어서 Node 의 Date 함수도 UTC. 컨테이너를 KST 로 고정 →
      # Date.getHours() / getFullYear() 등이 KST 반환 → scheduled_at 저장 시 밀림 방지.
      # MySQL 세션 timezone 은 lib/db.ts 의 connection 이벤트에서 별도로 +09:00 설정.
      TZ: Asia/Seoul
      # GCS 서비스 계정 키를 볼륨 경로로 지정 — 이미지에는 안 박힘
      GCS_KEY_FILE: /app/secrets/gcs-key.json
      # frontend 컨테이너가 SSR 시 호출할 backend 의 내부 호스트
      # (frontend 쪽에서 INTERNAL_BACK_API 로 참조)
    volumes:
      # 시크릿은 빌드 컨텍스트에 안 들어가도록 .dockerignore 로 제외 + 런타임 마운트
      - ./zk-back/community-gcs-key.json:/app/secrets/gcs-key.json:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:4000/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./zk-front
    container_name: zzikko-front
    ports:
      - "127.0.0.1:3040:3040"
    env_file:
      - ./zk-front/.env
    environment:
      NODE_ENV: production
      TZ: Asia/Seoul
      # SSR/RSC 가 컨테이너 안에서 사용할 백엔드 호스트 (도커 네트워크 내부 이름)
      INTERNAL_BACK_API: "http://backend:4000"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
